# Version Packages PR — opens / refreshes the "chore: version packages"
# PR whenever a `.changeset/*.md` lands on `main`. Merging that PR bumps
# versions and updates changelogs.
#
# NOTE: npm publish is intentionally NOT done here.
#
# Auto-publish from CI is parked: the previous setup 404'd on
# `PUT https://registry.npmjs.org/ovellum` despite a granular token
# with the right scopes. The chosen path is to publish locally —
# faster to iterate on, less moving infrastructure, and the maintainer's
# logged-in npm session already works.
#
# Manual release recipe lives in `docs/internal/TODO-Human.md` under
# "Release & launch". Short version: after merging the version-packages
# PR, run `pnpm -w build && cd packages/cli && npm publish` locally.
#
# If/when we revisit CI publishing, do it via npm Trusted Publishers
# (OIDC), not by reviving the NPM_TOKEN path. That removes the long-lived
# secret entirely and sidesteps the `registry-url` / `NODE_AUTH_TOKEN`
# collision that caused the original 404. Sketch: add a publish job with
# `permissions: id-token: write`, Node >=22.14 / npm >=11.5.1, and
# `npm publish --provenance --access public` after the version PR merges;
# register the trusted publisher in the package settings on npmjs.com.
# Docs: https://docs.npmjs.com/trusted-publishers
# History of the parked NPM_TOKEN attempt is in this file's git log.

name: Version PR

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  version:
    name: Open or refresh version PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Open or refresh version PR
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: 'chore: version packages'
          title: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
