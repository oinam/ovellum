name: Website preview

on:
  pull_request:
    branches: [main]
    paths:
      - 'website/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/website-preview.yml'

concurrency:
  group: website-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build site (preview)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the preview's "Edited" dates match production.
          # A shallow clone leaves git with only the tip commit, collapsing
          # every page's date onto the latest commit.
          fetch-depth: 0

      - name: Setup pnpm
        # Version is read from package.json's `packageManager` field —
        # don't duplicate it here, action-setup@v4 refuses both at once.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm exec turbo run build --filter='ovellum...'

      - name: Build website
        run: node packages/cli/dist/index.js build --cwd website

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: website-dist
          path: website/dist
          retention-days: 7

      - name: Summarize
        run: |
          {
            echo "## Website preview"
            echo ""
            echo "The site built successfully. Download the artifact named"
            echo "**website-dist** from this run to inspect the output locally."
          } >> "$GITHUB_STEP_SUMMARY"
